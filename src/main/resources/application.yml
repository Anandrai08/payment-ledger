spring:
  application:
    name: payment-ledger

  datasource:
    url: jdbc:mysql://localhost:3306/payment_ledger?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ledger
    password: ledgerpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.ledger: INFO
